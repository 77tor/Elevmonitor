<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElevMonitor Pro - Kode 7 (Full Cloud Version)</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; --white: #ffffff; --blue: #3498db; --orange: #f39c12; --red: #e74c3c; --gray: #95a5a6; --weekend: #fff0f0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; }
        
        /* Login Skjerm */
        #mainApp { display: none; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 2000; }

        .layout { display: grid; grid-template-columns: 320px 1fr 350px; gap: 15px; align-items: start; }
        .full-width { grid-column: 1 / -1; }
        .card { background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        
        header { display:flex; justify-content:space-between; align-items:center; background: var(--primary); color: white; padding: 8px 20px; border-radius: 8px; margin-bottom: 15px; }
        
        .form-row { display: flex; gap: 8px; }
        .form-group { flex: 1; }
        aside label { display: block; margin-top: 8px; font-weight: 600; font-size: 0.8rem; color: var(--primary); }
        aside input, aside textarea, aside select { width: 100%; padding: 8px; margin-top: 2px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        
        /* Kalender & Agenda */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(5, 1fr) 0.6fr 0.6fr; gap: 2px; border: 1px solid #eee; }
        .cal-day-name { font-weight: bold; font-size: 0.7rem; text-align: center; padding: 6px 0; background: #f8f9fa; }
        .cal-cell { height: 40px; background: white; border: 1px solid #f0f0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 0.85rem; position: relative; }
        .cal-cell.today { background: #ffeaa7; font-weight: bold; border: 2px solid var(--orange); }
        .cal-cell.selected { border: 2px solid var(--blue); background: #e3f2fd; }
        .cal-cell.holiday { background: var(--weekend); }
        .week-number { position: absolute; top: 1px; left: 1px; background: var(--primary); color: white; font-size: 0.5rem; padding: 1px 2px; border-radius: 2px; }
        .dot { width: 4px; height: 4px; background: var(--blue); border-radius: 50%; margin-top: 2px; }

        .event-viewer { margin-top: 15px; padding: 12px; background: #ebf5fb; border-left: 5px solid var(--blue); border-radius: 4px; }
        .agenda-item { padding: 8px 0; border-bottom: 1px solid #d4e6f1; font-size: 0.85rem; }
        .agenda-tag { font-size: 0.6rem; font-weight: bold; padding: 2px 6px; border-radius: 4px; background: #fff; border: 1px solid #ccc; }
        .agenda-tag.done { color: #aaa; background: #fafafa; }
        .agenda-comment { font-size: 0.8rem; color: #555; background: #fff; padding: 5px; border-radius: 4px; border-left: 3px solid var(--orange); margin-top: 4px; }

        /* Tabell */
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        th { background: #f8f9fa; color: #7f8c8d; text-transform: uppercase; font-size: 0.75rem; }
        .row-finished { color: #aaa; background-color: #fafafa; }

        /* Knapper */
        button { background: var(--primary); color: white; cursor: pointer; border: none; font-weight: bold; padding: 10px; border-radius: 4px; }
        .btn-small { padding: 5px 8px; font-size: 0.75rem; width: auto; }
        .check-btn { width: 18px; height: 18px; padding: 0; font-size: 10px; border-radius: 3px; border: 1px solid #ccc; background: #eee; color: #777; }
        .check-btn.checked { background: var(--accent); color: white; border-color: var(--accent); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 400px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="card" style="text-align: center; width: 320px;">
        <h2 style="color: var(--primary)">ElevMonitor Cloud</h2>
        <p>Logg inn med din skole-konto</p>
        <button onclick="loggInn()" style="background: var(--blue); width: 100%;">Logg inn med Google</button>
    </div>
</div>

<div id="mainApp">
    <header>
        <div style="display:flex; align-items:baseline; gap: 15px;">
            <h2 style="margin:0; font-size: 1.2rem;">ElevMonitor Pro</h2>
            <span id="userEmail" style="font-size: 0.75rem; opacity: 0.8;"></span>
            <button onclick="loggUt()" style="background: transparent; border: 1px solid white; font-size: 0.6rem; padding: 2px 8px; width: auto;">Logg ut</button>
        </div>
        <div id="dateNow" style="font-size: 0.9rem;"></div>
    </header>

    <div class="layout">
        <aside>
            <div class="card">
                <h3 style="margin-top:0;">Saksbehandling</h3>
                <input type="hidden" id="editKey"> 
                <div class="form-row">
                    <div class="form-group"><label>Elev</label><input type="text" id="navn"></div>
                    <div class="form-group" style="flex:0.5"><label>Klasse</label><input type="text" id="klasse"></div>
                </div>
                <label>Plan-type</label>
                <select id="plan">
                    <option value="Skolemiljøsak">Skolemiljøsak</option>
                    <option value="Skolefravær">Skolefravær</option>
                    <option value="Samtaler">Samtaler</option>
                    <option value="Elevkonflikter">Elevkonflikter</option>
                    <option value="Annet">Annet</option>
                </select>
                <label>Opprettet dato</label><input type="date" id="opprettet">
                <hr>
                <label>Oppfølging (Dato)</label><input type="date" id="oppfolgingDato">
                <textarea id="oppfolgingKommentar" placeholder="Hva skal gjøres?"></textarea>
                <div class="form-row">
                    <div class="form-group"><label>Neste Møte</label><input type="date" id="nesteMoteDato"></div>
                    <div class="form-group"><label>Kl.</label><input type="time" id="nesteMoteTid"></div>
                </div>
                <button style="background:var(--accent); margin-top:15px; width:100%" onclick="lagreData()" id="saveBtn">Lagre til Skyen</button>
                <button onclick="nullstill()" style="background:var(--gray); margin-top:5px; width:100%">Tøm felt</button>
            </div>
        </aside>

        <main>
            <div class="card">
                <div class="calendar-header">
                    <button onclick="changeMonth(-1)">&lt;</button>
                    <h3 id="monthDisplay"></h3>
                    <button onclick="changeMonth(1)">&gt;</button>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
                <div id="selectedDateContainer" class="event-viewer">
                    <strong id="selectedDateText">Agenda</strong>
                    <div id="eventList"><i>Velg en dato i kalenderen...</i></div>
                </div>
            </div>
        </main>

        <div class="card">
            <h3 style="margin-top:0; color: var(--orange); border-bottom: 1px solid #eee; padding-bottom: 5px;">Neste 4 gjøremål</h3>
            <div id="chronologicalTimeline"></div>
        </div>

        <div class="card full-width">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h3 style="margin:0;">Saksliste</h3>
                <button onclick="genererRapport()" style="width:auto; padding:8px 15px;">📄 Generer Kategorisert Rapport</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Elev & Klasse</th>
                        <th>Plan</th>
                        <th>Opprettet</th>
                        <th>Oppfølging</th>
                        <th>Neste møte</th>
                        <th>Valg</th>
                    </tr>
                </thead>
                <tbody id="mainTable"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="planModal" class="modal-overlay"><div class="modal-content"><h3 id="modalTitle"></h3><textarea id="modalEkstraNotat" style="width:100%; height:150px;"></textarea><div style="margin-top:10px;"><button onclick="savePopup()">Lagre</button> <button onclick="closePopup()">Lukk</button></div></div></div>
<div id="finishModal" class="modal-overlay"><div class="modal-content"><h3>Avslutt sak</h3><p id="finishNameText"></p><input type="date" id="finishDateInput"><div style="margin-top:10px;"><button onclick="confirmFinish()">Bekreft</button> <button onclick="closeFinishModal()">Avbryt</button></div></div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyBDZFZl-F8bUyAbwQU_yOZHgUYMA3XiB-0", authDomain: "sosped-haanes.firebaseapp.com", databaseURL: "https://sosped-haanes-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "sosped-haanes" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('elever');
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    let localDb = {}; let currentViewDate = new Date(); let selectedDateStr = "";

    // AUTH
    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userEmail').innerText = user.email;
            dbRef.on('value', (snapshot) => { localDb = snapshot.val() || {}; updateAll(); });
        } else {
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }
    });

    function loggInn() { auth.signInWithPopup(provider); }
    function loggUt() { auth.signOut(); }

    function updateAll() { updateTable(); renderCalendar(); updateTimeline(); if(selectedDateStr) showEvents(selectedDateStr); }

    // --- TABELL ---
    function updateTable() {
        const table = document.getElementById('mainTable');
        table.innerHTML = Object.keys(localDb).map(key => {
            const s = localDb[key];
            const isFin = s.status === 'avsluttet';
            return `<tr class="${isFin?'row-finished':''}">
                <td><strong>${s.navn}</strong><br><small>${s.klasse || '-'}</small></td>
                <td><span style="color:var(--blue);cursor:pointer;text-decoration:underline" onclick="openPopup('${key}')">${s.plan}</span></td>
                <td>${formatDate(s.opprettet)}</td>
                <td><button class="check-btn ${s.oppfolgingFullfort?'checked':''}" onclick="toggleDone('${key}', 'oppf')">✔️</button> ${formatDate(s.oppfolgingDato)}</td>
                <td><button class="check-btn ${s.moteFullfort?'checked':''}" onclick="toggleDone('${key}', 'mote')">✔️</button> ${formatDate(s.nesteMoteDato)} ${s.nesteMoteTid || ''}</td>
                <td>
                    <button class="btn-small" onclick="rediger('${key}')">Endre</button>
                    ${isFin ? `<button class="btn-small" onclick="toggleReopen('${key}')">Åpne</button>` : `<button class="btn-small" style="background:var(--gray)" onclick="openFinishModal('${key}')">Avslutt</button>`}
                    <button class="btn-small" style="background:var(--red)" onclick="slett('${key}')">Slett</button>
                </td>
            </tr>`;
        }).join('');
    }

    // --- AGENDA MED KOMMENTARER (KODE 6 LOGIKK) ---
    function showEvents(dStr) {
        selectedDateStr = dStr;
        let html = "";
        Object.values(localDb).forEach(s => {
            if(s.nesteMoteDato === dStr) {
                html += `<div class="agenda-item">
                    <span class="agenda-tag">${s.moteFullfort?'✅':'📅'} MØTE ${s.nesteMoteTid || ''}</span>
                    <strong>${s.navn}</strong> <small>(${s.klasse})</small>
                </div>`;
            }
            if(s.oppfolgingDato === dStr) {
                html += `<div class="agenda-item">
                    <span class="agenda-tag">${s.oppfolgingFullfort?'✅':'📝'} OPPFØLGING</span>
                    <strong>${s.navn}</strong> <small>(${s.klasse})</small>
                    ${s.oppfolgingKommentar ? `<div class="agenda-comment">${s.oppfolgingKommentar}</div>` : ''}
                </div>`;
            }
        });
        document.getElementById('eventList').innerHTML = html || "<i>Ingen planer.</i>";
        document.getElementById('selectedDateText').innerText = "Agenda for " + formatDate(dStr);
        renderCalendar();
    }

    // --- RAPPORT KATEGORISERT (KODE 6 LOGIKK) ---
    function genererRapport() {
        const win = window.open('', '_blank');
        const saker = Object.values(localDb).filter(s => s.status !== 'avsluttet');
        const typer = [...new Set(saker.map(s => s.plan))];
        let h = `<html><head><style>body{font-family:sans-serif;padding:20px} h2{background:#eee;padding:10px;border-left:5px solid var(--accent)} table{width:100%;border-collapse:collapse;margin-bottom:30px} th,td{border:1px solid #ddd;padding:8px;text-align:left}</style></head><body><h1>Saksrapport - ${new Date().toLocaleDateString()}</h1>`;
        typer.forEach(t => {
            h += `<h2>${t}</h2><table><tr><th>Elev</th><th>Klasse</th><th>Oppfølging</th><th>Møte</th></tr>`;
            saker.filter(s => s.plan === t).forEach(s => {
                h += `<tr><td>${s.navn}</td><td>${s.klasse}</td><td>${formatDate(s.oppfolgingDato)}<br><small>${s.oppfolgingKommentar || ''}</small></td><td>${formatDate(s.nesteMoteDato)}</td></tr>`;
            });
            h += `</table>`;
        });
        h += `<button onclick="window.print()">Skriv ut PDF</button></body></html>`;
        win.document.write(h); win.document.close();
    }

    // --- TIMELINE ---
    function updateTimeline() {
        let evs = [];
        Object.values(localDb).forEach(s => {
            if(s.status === 'avsluttet') return;
            if(s.nesteMoteDato && !s.moteFullfort) evs.push({d: s.nesteMoteDato, t: 'Møte', n: s.navn});
            if(s.oppfolgingDato && !s.oppfolgingFullfort) evs.push({d: s.oppfolgingDato, t: 'Oppf', n: s.navn});
        });
        evs.sort((a,b) => a.d.localeCompare(b.d));
        document.getElementById('chronologicalTimeline').innerHTML = evs.slice(0,4).map(e => `<div style="padding:8px; border-bottom:1px solid #eee"><strong>${formatDate(e.d)}</strong>: ${e.t} - ${e.n}</div>`).join('') || "Alt utført!";
    }

    // HJELPEFUNKSJONER
    function formatDate(s) { return s ? s.split('-').reverse().join('.') : "-"; }
    function lagreData() {
        const k = document.getElementById('editKey').value;
        const d = {
            navn: document.getElementById('navn').value,
            klasse: document.getElementById('klasse').value,
            plan: document.getElementById('plan').value,
            opprettet: document.getElementById('opprettet').value || new Date().toISOString().split('T')[0],
            oppfolgingDato: document.getElementById('oppfolgingDato').value,
            oppfolgingKommentar: document.getElementById('oppfolgingKommentar').value,
            nesteMoteDato: document.getElementById('nesteMoteDato').value,
            nesteMoteTid: document.getElementById('nesteMoteTid').value,
            status: 'aktiv'
        };
        if(!d.navn) return alert("Navn mangler");
        k ? dbRef.child(k).update(d) : dbRef.push(d);
        nullstill();
    }
    function rediger(k) {
        const s = localDb[k];
        document.getElementById('editKey').value = k;
        document.getElementById('navn').value = s.navn;
        document.getElementById('klasse').value = s.klasse;
        document.getElementById('plan').value = s.plan;
        document.getElementById('oppfolgingDato').value = s.oppfolgingDato;
        document.getElementById('oppfolgingKommentar').value = s.oppfolgingKommentar;
        document.getElementById('nesteMoteDato').value = s.nesteMoteDato;
        document.getElementById('nesteMoteTid').value = s.nesteMoteTid;
        document.getElementById('saveBtn').innerText = "Oppdater";
    }
    function nullstill() { document.getElementById('editKey').value = ""; document.querySelectorAll('input, textarea').forEach(i => i.value = ""); document.getElementById('saveBtn').innerText = "Lagre til Skyen"; }
    function slett(k) { if(confirm("Slette?")) dbRef.child(k).remove(); }
    function toggleDone(k, type) { if(type==='oppf') dbRef.child(k).update({oppfolgingFullfort: !localDb[k].oppfolgingFullfort}); else dbRef.child(k).update({moteFullfort: !localDb[k].moteFullfort}); }
    
    function changeMonth(v) { currentViewDate.setMonth(currentViewDate.getMonth() + v); renderCalendar(); }
    function renderCalendar() {
        const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
        const y = currentViewDate.getFullYear(), m = currentViewDate.getMonth();
        document.getElementById('monthDisplay').innerText = new Intl.DateTimeFormat('no-NO', {month:'long', year:'numeric'}).format(currentViewDate);
        ['Ma','Ti','On','To','Fr','Lø','Sø'].forEach(d => grid.innerHTML += `<div class="cal-day-name">${d}</div>`);
        const first = (new Date(y, m, 1).getDay() || 7) - 1;
        for(let i=0; i<first; i++) grid.innerHTML += `<div></div>`;
        for(let d=1; d<=new Date(y, m+1, 0).getDate(); d++) {
            const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            let dots = 0; Object.values(localDb).forEach(s => { if(s.nesteMoteDato===dStr || s.oppfolgingDato===dStr) dots++; });
            grid.innerHTML += `<div class="cal-cell ${selectedDateStr===dStr?'selected':''} ${new Date().toISOString().split('T')[0]===dStr?'today':''}" onclick="showEvents('${dStr}')">
                <span>${d}</span>${dots?`<div class="dot"></div>`:''}
            </div>`;
        }
    }

    // Modal funksjoner
    function openPopup(k) { document.getElementById('modalKey').value = k; document.getElementById('modalTitle').innerText = localDb[k].navn; document.getElementById('modalEkstraNotat').value = localDb[k].ekstraNotat || ""; document.getElementById('planModal').style.display = "flex"; }
    function closePopup() { document.getElementById('planModal').style.display = "none"; }
    function savePopup() { dbRef.child(document.getElementById('modalKey').value).update({ekstraNotat: document.getElementById('modalEkstraNotat').value}); closePopup(); }
    function openFinishModal(k) { document.getElementById('finishKey').value = k; document.getElementById('finishNameText').innerText = localDb[k].navn; document.getElementById('finishModal').style.display = "flex"; }
    function closeFinishModal() { document.getElementById('finishModal').style.display = "none"; }
    function confirmFinish() { dbRef.child(document.getElementById('finishKey').value).update({status: 'avsluttet'}); closeFinishModal(); }
    function toggleReopen(k) { dbRef.child(k).update({status: 'aktiv'}); }

    document.getElementById('dateNow').innerText = new Date().toLocaleDateString('no-NO', {weekday:'long', day:'numeric', month:'long'});
    renderCalendar();
</script>
<input type="hidden" id="modalKey">
<input type="hidden" id="finishKey">
</body>
</html>
